<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Developer Productivity Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <header class="header">
        <h1>Developer Productivity Dashboard</h1>

        <button id="theme-toggle">🌙 Dark Mode</button>
      </header>

      <section class="stats">
        <div class="card">
          <h3>Total Tasks</h3>
          <p id="total-tasks">0</p>
        </div>

        <div class="card">
          <h3>Completed</h3>
          <p id="completed-tasks">0</p>
        </div>

        <div class="card">
          <h3>Pending</h3>
          <p id="pending-tasks">0</p>
        </div>
      </section>

      <section class="task-section">
        <h2>Tasks</h2>

        <form id="task-form">
          <input id="task-input" type="text" placeholder="Add Task..." />

          <button type="submit">Add</button>
        </form>

        <input id="search-input" type="text" placeholder="Search tasks..." />

        <ul id="task-list"></ul>
      </section>

      <section class="timer-section">
        <h2>Pomodoro Timer</h2>

        <h1 id="timer">25:00</h1>

        <button id="start-timer">Start</button>

        <button id="reset-timer">Reset</button>
      </section>

      <section class="quote-section">
        <h2>Motivational Quote</h2>

        <p id="quote">Loading...</p>

        <button id="new-quote">New Quote</button>
      </section>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/search.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/quotes.js"></script>
    <script src="js/tasks.js"></script>
  </body>
</html>
