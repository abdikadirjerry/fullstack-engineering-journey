<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Weather Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>Skyline Weather</h1>
                <button id="theme-toggle" class="btn-secondary">Toggle Theme</button>
            </div>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card weather-card hidden" id="weather-card">
                <h2 id="location-name">City, Country</h2>
                <div class="temp-display" id="temp-display">--°C</div>
                <p class="weather-condition" id="weather-condition">Condition Description</p>
                
                <div class="metrics-grid">
                    <div class="metric-item">
                        <span>Wind Speed</span>
                        <strong id="wind-metric">-- km/h</strong>
                    </div>
                    <div class="metric-item">
                        <span>Weather Code</span>
                        <strong id="code-metric">--</strong>
                    </div>
                </div>
            </section>

            <section class="card history-card">
                <h3>Recent Searches</h3>
                <ul id="history-list" class="history-list"></ul>
                <button id="clear-history-btn" class="btn-text hidden">Clear History</button>
            </section>
        </main>

        <div id="error-banner" class="error-banner hidden">
            <p>Could not find matching city records. Please check the spelling.</p>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
