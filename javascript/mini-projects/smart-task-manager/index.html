<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>
        Smart Task Manager
        <span id="task-count"> 0 </span>
      </h1>

      <form id="task-form">
        <input type="text" id="task-input" placeholder="Enter task" />

        <button type="submit">Add</button>
      </form>

      <input type="text" id="search-input" placeholder="Search tasks..." />

      <h3 id="total-tasks">Total Tasks: 0</h3>

      <h3 id="completed-tasks">Completed Tasks: 0</h3>

      <ul id="task-list"></ul>

      <hr />

      <h2>Motivational Quote</h2>

      <p id="quote">Click button to load quote.</p>

      <button id="quote-btn">Load Quote</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
