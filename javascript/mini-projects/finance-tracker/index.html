<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>DevTracker Pro</title>

    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <div>
            <h1>DevTracker Pro</h1>

            <p>Developer Productivity Dashboard</p>
          </div>

          <button id="theme-toggle">🌙 Dark Mode</button>
        </div>
      </header>

      <section class="dashboard">
        <div class="card">
          <h3>Total Tasks</h3>

          <p id="total-tasks">0</p>
        </div>

        <div class="card">
          <h3>Completed</h3>

          <p id="completed-tasks">0</p>
        </div>

        <div class="card">
          <h3>Completion Rate</h3>

          <p id="completion-rate">0%</p>
        </div>
      </section>

      <section class="task-section">
        <h2>Tasks</h2>

        <form id="task-form">
          <input type="text" id="task-input" placeholder="Add task..." />

          <button type="submit">Add</button>
        </form>

        <ul id="task-list"></ul>
      </section>

      <section class="timer-section">
        <h2>Pomodoro Timer</h2>

        <h3 id="timer">25:00</h3>

        <button id="start-btn">Start</button>

        <button id="pause-btn">Pause</button>

        <button id="reset-btn">Reset</button>
      </section>
    </div>

    <script src="./js/storage.js"></script>
    <script src="./js/tasks.js"></script>
    <script src="./js/timer.js"></script>
    <script src="./js/stats.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/quotes.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
