<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitTrack | Personal Workout Tracker</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container">
        <h1>FitTrack</h1>
        <p>Track metrics, smash goals.</p>
      </div>
    </header>

    <main class="container main-content">
      <section class="dashboard-section card">
        <h2>Activity Summary</h2>
        <div class="stats-grid" id="stats-container">
          <div class="stat-box">
            <span class="stat-label">Total Workouts</span>
            <span class="stat-value" id="total-workouts">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Total Volume (kg)</span>
            <span class="stat-value" id="total-volume">0</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Top Exercise</span>
            <span class="stat-value" id="top-exercise">-</span>
          </div>
        </div>
      </section>

      <section class="form-section card">
        <h2>Log Workout</h2>
        <form id="workout-form" novalidate>
          <div class="form-group">
            <label for="exercise-name">Exercise Name</label>
            <input
              type="text"
              id="exercise-name"
              placeholder="e.g., Bench Press, Squat"
              required
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="workout-weight">Weight (kg)</label>
              <input
                type="number"
                id="workout-weight"
                min="0"
                placeholder="0"
                required
              />
            </div>
            <div class="form-group">
              <label for="workout-reps">Reps</label>
              <input
                type="number"
                id="workout-reps"
                min="0"
                placeholder="0"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary">Add Log</button>
        </form>
      </section>

      <section class="history-section card">
        <h2>Recent Activity</h2>
        <div class="table-responsive">
          <table class="workout-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Exercise</th>
                <th>Weight</th>
                <th>Reps</th>
                <th>Estimated 1RM</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="workout-list"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/workout.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
